<!DOCTYPE html>
<html lang="ru">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Вход — Adventicle</title>
     <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
</head>
<body>
     <!-- TODO: заменить на дизайн login.html, который пришлёт пользователь -->
     <div class="main">
          <div class="register_form">
               <h3 class="title">Adventicle</h3>
               <p>С возвращением на <br><slot>орбиту</slot></p>

               {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                         {% for category, msg in messages %}
                              <p style="color:#f87171; font-size:16px;">{{ msg }}</p>
                         {% endfor %}
                    {% endif %}
               {% endwith %}

               <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="field-group">
                         <input type="email" name="email" placeholder="email" required>
                    </div>

                    <div class="field-group">
                         <input type="password" name="password" placeholder="введите пароль" required>
                    </div>

                    <button class="registrButton" type="submit">войти</button>
               </form>
          </div>

          <div class="decoration">
               <div class="headerlogin">
                    <h6 class="loginText">Ещё нет аккаунта?</h6>
                    <a href="{{ url_for('auth.register') }}"><button type="button" class="loginButton">Регистрация</button></a>
               </div>
          </div>
     </div>
</body>
</html>
