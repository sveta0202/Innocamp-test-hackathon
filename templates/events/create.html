<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новое событие — Adventicle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/user.css') }}">
</head>
<body>

    <div class="messages-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="message-item {{ 'success' if category == 'success' else 'error' }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <div class="main-content" style="margin:40px auto; max-width:600px;">
        <div class="calendar-header">
            <div class="current-month">Новое событие</div>
        </div>

        <form method="POST" action="{{ url_for('events_bp.create') }}">
            <div class="form-group">
                <label for="title">Название *</label>
                <input type="text" id="title" name="title" class="form-control" required>
            </div>

            <div class="form-row" style="padding:0 25px;">
                <div class="form-group" style="padding:0;">
                    <label for="event_date">Дата *</label>
                    <input type="date" id="event_date" name="event_date" class="form-control" required>
                </div>
                <div class="form-group" style="padding:0;">
                    <label for="event_time">Время *</label>
                    <input type="time" id="event_time" name="event_time" class="form-control" required>
                </div>
            </div>

            <div class="form-group">
                <label for="category">Категория</label>
                <select id="category" name="category" class="form-control">
                    <option value="meeting">Встреча</option>
                    <option value="personal">Личное</option>
                    <option value="work">Работа</option>
                    <option value="important">Важное</option>
                    <option value="other" selected>Другое</option>
                </select>
            </div>

            <div class="form-group">
                <label for="location">Место</label>
                <input type="text" id="location" name="location" class="form-control" placeholder="Где будет проходить событие">
            </div>

            <div class="form-group">
                <label for="description">Описание</label>
                <textarea id="description" name="description" class="form-control" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="member_emails">Участники (email через запятую)</label>
                <input type="text" id="member_emails" name="member_emails" class="form-control"
                       placeholder="friend@example.com, colleague@example.com">
                {% if users %}
                    <small>Доступные пользователи: {{ users | map(attribute='email') | join(', ') }}</small>
                {% endif %}
            </div>

            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="important">
                    Важное событие
                </label>
            </div>

            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="notify">
                    Напомнить за 15 минут
                </label>
            </div>

            <div class="btn-group">
                <a href="{{ url_for('calendar_bp.index') }}"><button type="button" class="btn btn-secondary">Отмена</button></a>
                <button type="submit" class="btn btn-primary">Создать событие</button>
            </div>
        </form>
    </div>
</body>
</html>
